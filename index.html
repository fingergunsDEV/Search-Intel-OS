<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search Intel OS — HGM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
:root {
  --bg:       #0b0e17;
  --surface:  #111827;
  --surface2: #161d2e;
  --surface3: #1e2740;
  --glass:    rgba(255,255,255,0.04);
  --glass-border: rgba(255,255,255,0.08);
  --glass-hover:  rgba(255,255,255,0.07);
  --indigo:      #6366f1;
  --indigo-light:#818cf8;
  --indigo-dim:  rgba(99,102,241,0.15);
  --success:  #10b981;
  --success-dim: rgba(16,185,129,0.12);
  --warning:  #f59e0b;
  --warning-dim: rgba(245,158,11,0.12);
  --danger:   #ef4444;
  --danger-dim:  rgba(239,68,68,0.12);
  --info:     #38bdf8;
  --info-dim: rgba(56,189,248,0.12);
  --purple:   #a78bfa;
  --purple-dim: rgba(167,139,250,0.12);
  --text:    #f1f5f9;
  --text-2:  #94a3b8;
  --text-3:  #475569;
  --text-4:  #334155;
  --font-ui:   'Plus Jakarta Sans', sans-serif;
  --font-data: 'Inter', sans-serif;
  --sidebar-w: 240px;
  --topbar-h: 56px;
  --radius: 12px;
  --radius-sm: 8px;
  --radius-xs: 6px;
}
body { font-family: var(--font-ui); background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.18); }

/* SHELL */
.shell { display: flex; height: 100vh; overflow: hidden; }

/* SIDEBAR */
.sidebar { width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--glass-border); display: flex; flex-direction: column; flex-shrink: 0; transition: width 0.25s cubic-bezier(0.4,0,0.2,1); overflow: hidden; z-index: 20; }
.sidebar.collapsed { width: 60px; }
.sidebar.collapsed .brand-wordmark,
.sidebar.collapsed .nav-label,
.sidebar.collapsed .nav-section,
.sidebar.collapsed .sb-conn-text,
.sidebar.collapsed .sb-conn-label { display: none; }
.brand { display: flex; align-items: center; gap: 12px; padding: 20px 16px 16px; border-bottom: 1px solid var(--glass-border); flex-shrink: 0; }
.brand-mark { width: 32px; height: 32px; background: var(--indigo-dim); border: 1px solid rgba(99,102,241,0.35); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.brand-mark svg { width: 16px; height: 16px; fill: var(--indigo-light); }
.brand-name { font-size: 13px; font-weight: 700; color: var(--text); letter-spacing: -0.01em; line-height: 1.2; }
.brand-sub { font-size: 10px; color: var(--text-3); font-weight: 400; margin-top: 1px; }
.nav-section { font-size: 10px; font-weight: 600; color: var(--text-3); letter-spacing: 0.08em; text-transform: uppercase; padding: 20px 16px 6px; white-space: nowrap; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 14px; margin: 1px 8px; border-radius: var(--radius-xs); cursor: pointer; transition: all 0.15s; color: var(--text-2); font-size: 13px; font-weight: 500; background: none; border: none; width: calc(100% - 16px); text-align: left; white-space: nowrap; position: relative; }
.nav-item:hover { background: var(--glass); color: var(--text); }
.nav-item.active { background: var(--indigo-dim); color: var(--indigo-light); }
.nav-item.active::before { content: ''; position: absolute; left: -8px; top: 50%; transform: translateY(-50%); width: 3px; height: 20px; background: var(--indigo); border-radius: 0 2px 2px 0; }
.nav-icon { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.7; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.nav-item.active .nav-icon { opacity: 1; }
.nav-badge { margin-left: auto; font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 20px; background: var(--danger-dim); color: var(--danger); }
.sb-footer { margin-top: auto; padding: 12px 16px; border-top: 1px solid var(--glass-border); display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.sb-conn-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-4); flex-shrink: 0; transition: background 0.3s; }
.sb-conn-dot.live { background: var(--success); box-shadow: 0 0 6px rgba(16,185,129,0.5); animation: pulse-dot 2.5s ease-in-out infinite; }
.sb-conn-dot.connecting { background: var(--warning); animation: pulse-dot 1s ease-in-out infinite; }
.sb-conn-text { font-size: 12px; font-weight: 500; }
.sb-conn-label { font-size: 10px; color: var(--text-3); }

/* MAIN */
.main-col { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

/* TOPBAR */
.topbar { height: var(--topbar-h); background: var(--surface); border-bottom: 1px solid var(--glass-border); display: flex; align-items: center; gap: 12px; padding: 0 20px; flex-shrink: 0; }
.btn-collapse { width: 32px; height: 32px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: var(--radius-xs); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-2); transition: all 0.15s; flex-shrink: 0; }
.btn-collapse:hover { background: var(--glass-hover); color: var(--text); }
.btn-collapse svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }
.topbar-title { font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: -0.02em; white-space: nowrap; }
.topbar-title span { color: var(--indigo-light); }
.topbar-sep { width: 1px; height: 20px; background: var(--glass-border); flex-shrink: 0; }
.tb-spacer { flex: 1; }
.status-pill { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 500; padding: 4px 10px; border-radius: 20px; border: 1px solid; white-space: nowrap; }
.pill-live { border-color: rgba(16,185,129,0.3); color: var(--success); background: var(--success-dim); }
.pill-idle { border-color: rgba(71,85,105,0.4); color: var(--text-3); background: rgba(71,85,105,0.1); }
.pill-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
.pill-live .pill-dot { animation: pulse-dot 1.5s ease-in-out infinite; }
.date-sel { background: var(--glass); border: 1px solid var(--glass-border); border-radius: var(--radius-xs); color: var(--text-2); font-family: var(--font-ui); font-size: 12px; font-weight: 500; padding: 6px 10px; cursor: pointer; outline: none; transition: all 0.15s; }
.date-sel:hover { background: var(--glass-hover); color: var(--text); }
.date-sel option { background: var(--surface2); }
.tb-btn { display: flex; align-items: center; gap: 6px; font-family: var(--font-ui); font-size: 12px; font-weight: 500; padding: 6px 12px; border-radius: var(--radius-xs); border: 1px solid var(--glass-border); background: var(--glass); color: var(--text-2); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.tb-btn:hover:not(:disabled) { background: var(--glass-hover); color: var(--text); }
.tb-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.tb-btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; }
.tb-btn-primary { background: var(--indigo); border-color: var(--indigo); color: #fff; }
.tb-btn-primary:hover:not(:disabled) { background: var(--indigo-light); border-color: var(--indigo-light); color: #fff; }
.tb-btn-danger { background: var(--danger-dim); border-color: rgba(239,68,68,0.3); color: var(--danger); }
.tb-btn-danger:hover:not(:disabled) { background: rgba(239,68,68,0.2); }
.tb-clock { font-family: var(--font-data); font-size: 12px; color: var(--text-3); font-variant-numeric: tabular-nums; }

/* DRILLDOWN */
.drilldown-bar { height: 36px; background: var(--indigo-dim); border-bottom: 1px solid rgba(99,102,241,0.2); display: none; align-items: center; gap: 8px; padding: 0 20px; font-size: 12px; color: var(--text-2); flex-shrink: 0; }
.drilldown-bar.visible { display: flex; }
.drilldown-crumb { color: var(--indigo-light); cursor: pointer; }
.drilldown-crumb:hover { text-decoration: underline; }
.drilldown-current { font-weight: 500; color: var(--text); max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* TABS */
.tabs { display: flex; align-items: center; gap: 2px; padding: 0 20px; border-bottom: 1px solid var(--glass-border); background: var(--surface); flex-shrink: 0; overflow-x: auto; }
.tabs::-webkit-scrollbar { height: 0; }
.tab { padding: 10px 14px; font-size: 12px; font-weight: 500; color: var(--text-3); cursor: pointer; border: none; background: none; border-bottom: 2px solid transparent; transition: all 0.15s; white-space: nowrap; font-family: var(--font-ui); margin-bottom: -1px; }
.tab:hover { color: var(--text-2); }
.tab.active { color: var(--indigo-light); border-bottom-color: var(--indigo); }

/* CONTENT */
.content { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }

/* METRIC CARDS */
.metrics-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
.metric-card { background: var(--surface2); border: 1px solid var(--glass-border); border-radius: var(--radius); padding: 16px 18px; position: relative; overflow: hidden; animation: fadeUp 0.5s ease both; transition: border-color 0.2s, transform 0.15s; }
.metric-card:hover { border-color: rgba(255,255,255,0.14); transform: translateY(-1px); }
.metric-accent { position: absolute; top: 0; left: 0; right: 0; height: 2px; border-radius: var(--radius) var(--radius) 0 0; }
.metric-icon-wrap { width: 32px; height: 32px; border-radius: var(--radius-xs); display: flex; align-items: center; justify-content: center; margin-bottom: 12px; }
.metric-icon-wrap svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; }
.metric-label { font-size: 11px; font-weight: 500; color: var(--text-3); letter-spacing: 0.03em; margin-bottom: 4px; text-transform: uppercase; }
.metric-value { font-size: 28px; font-weight: 700; letter-spacing: -0.03em; line-height: 1; font-family: var(--font-data); }
.metric-meta { font-size: 11px; color: var(--text-3); margin-top: 6px; }
.delta-up { color: var(--success); font-weight: 600; }
.delta-dn { color: var(--danger); font-weight: 600; }

/* CARDS */
.card { background: var(--surface2); border: 1px solid var(--glass-border); border-radius: var(--radius); overflow: hidden; transition: border-color 0.2s; }
.card:hover { border-color: rgba(255,255,255,0.12); }
.card-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--glass-border); gap: 12px; }
.card-title { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; }
.card-title svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; opacity: 0.6; }
.card-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.card-body { padding: 16px 18px; }
.chart-body { padding: 12px 16px 14px; }

/* GRIDS */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; }
.grid-3r { display: grid; grid-template-columns: 1fr 2fr; gap: 16px; }
.grid-3-equal { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
.col-2 { grid-column: span 2; }

/* BADGES */
.badge { display: inline-flex; align-items: center; font-size: 10px; font-weight: 600; font-family: var(--font-data); padding: 2px 8px; border-radius: 20px; letter-spacing: 0.02em; white-space: nowrap; }
.badge-indigo  { background: var(--indigo-dim);   color: var(--indigo-light); }
.badge-success { background: var(--success-dim);  color: var(--success); }
.badge-warning { background: var(--warning-dim);  color: var(--warning); }
.badge-danger  { background: var(--danger-dim);   color: var(--danger); }
.badge-info    { background: var(--info-dim);     color: var(--info); }
.badge-purple  { background: var(--purple-dim);   color: var(--purple); }
.badge-muted   { background: rgba(71,85,105,0.15); color: var(--text-3); }

/* TABLES */
.table-wrap { overflow-x: auto; overflow-y: auto; max-height: 340px; }
.table-wrap.tall { max-height: 480px; }
table { width: 100%; border-collapse: collapse; font-family: var(--font-data); }
thead th { font-size: 10px; font-weight: 600; color: var(--text-3); letter-spacing: 0.06em; text-transform: uppercase; padding: 8px 14px; text-align: left; background: var(--surface); border-bottom: 1px solid var(--glass-border); position: sticky; top: 0; z-index: 2; white-space: nowrap; }
tbody td { font-size: 12px; color: var(--text-2); padding: 9px 14px; border-bottom: 1px solid rgba(255,255,255,0.04); transition: background 0.1s; vertical-align: middle; }
tbody tr:hover td { background: var(--glass); }
tbody tr:last-child td { border-bottom: none; }
.td-primary { font-weight: 500; color: var(--text); font-size: 12px; }
.td-url { color: var(--info); font-size: 11px; max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.td-mono { font-family: var(--font-data); }
.pos-1-3  { color: var(--success); font-weight: 600; }
.pos-4-10 { color: var(--warning); font-weight: 600; }
.pos-11p  { color: var(--danger);  font-weight: 600; }

/* BUTTONS */
.btn { display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-ui); font-size: 12px; font-weight: 500; padding: 6px 12px; border-radius: var(--radius-xs); border: 1px solid var(--glass-border); background: var(--glass); color: var(--text-2); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.btn:hover { background: var(--glass-hover); color: var(--text); }
.btn:active { transform: scale(0.97); }
.btn svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; }
.btn-sm { padding: 4px 9px; font-size: 11px; }
.btn-indigo { background: var(--indigo); border-color: var(--indigo); color: #fff; }
.btn-indigo:hover { background: var(--indigo-light); border-color: var(--indigo-light); color: #fff; }
.btn-success { background: var(--success-dim); border-color: rgba(16,185,129,0.3); color: var(--success); }
.btn-success:hover { background: rgba(16,185,129,0.2); }
.btn-warning { background: var(--warning-dim); border-color: rgba(245,158,11,0.3); color: var(--warning); }
.btn-danger  { background: var(--danger-dim);  border-color: rgba(239,68,68,0.3);  color: var(--danger);  }

/* INPUTS */
.input { background: var(--surface3); border: 1px solid var(--glass-border); border-radius: var(--radius-xs); padding: 7px 12px; font-family: var(--font-ui); font-size: 12px; color: var(--text); outline: none; transition: border-color 0.15s; width: 100%; }
.input:focus { border-color: rgba(99,102,241,0.5); }
.input::placeholder { color: var(--text-3); }
.input-label { font-size: 11px; font-weight: 500; color: var(--text-3); margin-bottom: 5px; display: block; letter-spacing: 0.02em; }
.input-hint { font-size: 10px; color: var(--text-4); margin-top: 4px; line-height: 1.6; }
.form-row { display: flex; flex-direction: column; margin-bottom: 16px; }
.search-filter { display: flex; align-items: center; gap: 8px; background: var(--surface3); border: 1px solid var(--glass-border); border-radius: var(--radius-xs); padding: 0 10px; transition: border-color 0.15s; }
.search-filter:focus-within { border-color: rgba(99,102,241,0.4); }
.search-filter svg { width: 13px; height: 13px; stroke: var(--text-3); fill: none; stroke-width: 2; flex-shrink: 0; }
.search-filter input { background: none; border: none; outline: none; font-family: var(--font-ui); font-size: 12px; color: var(--text); padding: 7px 0; width: 180px; }
.search-filter input::placeholder { color: var(--text-3); }

/* EMPTY / LOADING */
.state-empty, .state-loading { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; padding: 48px 24px; text-align: center; color: var(--text-3); }
.state-empty svg, .state-loading svg { width: 36px; height: 36px; stroke: var(--text-4); fill: none; stroke-width: 1.2; }
.state-empty h4, .state-loading h4 { font-size: 13px; font-weight: 600; color: var(--text-2); }
.state-empty p, .state-loading p { font-size: 12px; line-height: 1.6; max-width: 320px; }
.spin { animation: spin 0.9s linear infinite; }

/* ACTIVITY LOG */
.activity-log { background: var(--bg); border-radius: var(--radius-sm); overflow: hidden; border: 1px solid var(--glass-border); }
.log-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 14px; background: var(--surface); border-bottom: 1px solid var(--glass-border); }
.log-header-title { font-size: 11px; font-weight: 500; color: var(--text-3); }
.log-body { padding: 10px; height: 160px; overflow-y: auto; display: flex; flex-direction: column; gap: 2px; }
.log-line { display: flex; gap: 8px; align-items: baseline; font-family: var(--font-data); font-size: 11px; }
.log-ts  { color: var(--text-4); width: 62px; flex-shrink: 0; }
.log-tag { width: 48px; flex-shrink: 0; font-size: 10px; font-weight: 600; letter-spacing: 0.04em; border-radius: 3px; padding: 0 4px; text-align: center; }
.log-msg { color: var(--text-2); }
.log-ok   .log-tag { background: var(--success-dim); color: var(--success); }
.log-warn .log-tag { background: var(--warning-dim); color: var(--warning); }
.log-err  .log-tag { background: var(--danger-dim);  color: var(--danger);  }
.log-info .log-tag { background: var(--info-dim);    color: var(--info);    }
.log-ai   .log-tag { background: var(--purple-dim);  color: var(--purple);  }

/* TOAST */
#toasts { position: fixed; top: 16px; right: 16px; display: flex; flex-direction: column; gap: 8px; z-index: 9999; pointer-events: none; }
.toast { display: flex; align-items: flex-start; gap: 12px; background: var(--surface2); border: 1px solid var(--glass-border); border-radius: var(--radius); padding: 12px 16px; min-width: 300px; max-width: 380px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); animation: slideIn 0.22s ease; pointer-events: auto; border-left: 3px solid; }
.toast-success { border-left-color: var(--success); }
.toast-warning { border-left-color: var(--warning); }
.toast-danger  { border-left-color: var(--danger); }
.toast-info    { border-left-color: var(--indigo); }
.toast-icon { width: 16px; height: 16px; flex-shrink: 0; margin-top: 1px; }
.toast-icon svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }
.toast-success .toast-icon { color: var(--success); }
.toast-warning .toast-icon { color: var(--warning); }
.toast-danger  .toast-icon { color: var(--danger); }
.toast-info    .toast-icon { color: var(--indigo-light); }
.toast-body { flex: 1; }
.toast-title { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
.toast-msg   { font-size: 11px; color: var(--text-2); line-height: 1.4; }
.toast-close { background: none; border: none; color: var(--text-3); cursor: pointer; font-size: 16px; line-height: 1; padding: 0; }
.toast-close:hover { color: var(--text); }

/* STATUS BAR */
.statusbar { height: 30px; background: var(--surface); border-top: 1px solid var(--glass-border); display: flex; align-items: center; flex-shrink: 0; overflow: hidden; }
.sb-item { display: flex; align-items: center; gap: 6px; padding: 0 14px; font-size: 11px; font-family: var(--font-data); color: var(--text-3); border-right: 1px solid var(--glass-border); height: 100%; white-space: nowrap; }
.sb-item svg { width: 11px; height: 11px; stroke: currentColor; fill: none; stroke-width: 1.5; opacity: 0.6; }
.sb-item .highlight { color: var(--indigo-light); font-weight: 500; }
.sb-item.right { margin-left: auto; border-right: none; border-left: 1px solid var(--glass-border); }

/* POS BARS */
.pos-bars { display: flex; align-items: flex-end; gap: 6px; height: 64px; padding: 0 2px; }
.pos-bar-group { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
.pos-bar-fill { width: 100%; border-radius: 3px 3px 0 0; min-height: 3px; transition: height 0.7s cubic-bezier(0.34,1.56,0.64,1); }
.pos-bar-lbl   { font-size: 9px; color: var(--text-3); font-family: var(--font-data); }
.pos-bar-count { font-size: 9px; font-weight: 600; }

/* OPP SCORE BAR */
.opp-score-bar  { width: 80px; height: 4px; background: var(--surface3); border-radius: 2px; overflow: hidden; }
.opp-score-fill { height: 100%; border-radius: 2px; }

/* INTENT GRID */
.intent-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.intent-item { background: var(--surface3); border-radius: var(--radius-sm); padding: 10px 12px; }
.intent-label { font-size: 10px; font-weight: 600; color: var(--text-3); letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 4px; }
.intent-value { font-size: 18px; font-weight: 700; font-family: var(--font-data); letter-spacing: -0.02em; }
.intent-sub { font-size: 10px; color: var(--text-3); margin-top: 2px; }

/* CONFIG */
.config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.config-info-box { background: var(--surface3); border: 1px solid var(--glass-border); border-radius: var(--radius-sm); padding: 14px 16px; font-size: 11px; color: var(--text-2); line-height: 1.9; margin-top: 16px; }
.config-info-box strong { color: var(--indigo-light); }
.config-info-box code { background: var(--surface); color: var(--info); padding: 1px 5px; border-radius: 3px; font-family: var(--font-data); }

/* CANNIBAL */
.cannibal-row td { background: rgba(239,68,68,0.03); }

/* ANIMATIONS */
@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideIn { from { opacity: 0; transform: translateX(16px); } to { opacity: 1; transform: translateX(0); } }
@keyframes slideOut { to { opacity: 0; transform: translateX(16px); } }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
@keyframes metric-shimmer { 0% { box-shadow: 0 0 0 0 var(--glow-c,transparent); } 40% { box-shadow: 0 0 18px 3px var(--glow-c,transparent); } 100% { box-shadow: 0 0 0 0 var(--glow-c,transparent); } }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } }

/* RESPONSIVE */
@media (max-width: 1100px) { .metrics-grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 860px) {
  :root { --sidebar-w: 60px; }
  .brand-wordmark, .nav-label, .nav-section, .sb-conn-text, .sb-conn-label { display: none; }
  .grid-2, .grid-3, .grid-3r, .grid-3-equal { grid-template-columns: 1fr; }
  .col-2 { grid-column: span 1; }
  .metrics-grid { grid-template-columns: 1fr 1fr; }
  .config-grid { grid-template-columns: 1fr; }
}
@media (max-width: 520px) { .metrics-grid { grid-template-columns: 1fr; } .content { padding: 12px; gap: 12px; } }
</style>
</head>

<script>
// ══════════════════════════════════════════════════════════
//  SEARCH INTEL OS v3.2  —  HGM
// ══════════════════════════════════════════════════════════

const CONFIG = { CLIENT_ID: '', GSC_SITE: '', GA4_PROPERTY: '',
  SCOPES: 'https://www.googleapis.com/auth/webmasters.readonly https://www.googleapis.com/auth/analytics.readonly' };

const S = {
  token: null, tokenExpiry: null,
  view: 'config', tab: 0, dateRange: 28, filterText: '',
  gscRows: null, gscPages: null, gscTimeSeries: null, gscDevices: null,
  ga4Overview: null, ga4Channels: null, ga4Pages: null, ga4TimeSeries: null,
  charts: {}, logLines: [], lastSync: null
};

const VIEWS = {
  dashboard:       { tabs: ['Overview', 'Performance Trend', 'Top Queries', 'Top Pages'] },
  gsc:             { tabs: ['Query Explorer', 'Position Map', 'CTR Analysis', 'Device Split'] },
  ga4:             { tabs: ['Overview', 'Channels', 'Pages & Content'] },
  aeo:             { tabs: ['AI Overview Detection', 'Intent Radar', 'Snippet Compliance', 'GEO Signals'] },
  opportunities:   { tabs: ['Quick Wins', 'Featured Snippet Targets', 'Ranking Gaps'] },
  cannibalization: { tabs: ['Query Conflicts', 'Page Overlap'] },
  config:          { tabs: ['API Credentials', 'Setup Guide'] }
};

// ── CHART DEFAULTS ────────────────────────────────────────
Chart.defaults.color = '#475569';
Chart.defaults.borderColor = 'rgba(255,255,255,0.06)';
Chart.defaults.font.family = "'Inter', sans-serif";
Chart.defaults.font.size = 11;
Chart.defaults.plugins.legend.labels.boxWidth = 10;
Chart.defaults.plugins.legend.labels.padding = 16;

// ── FORMATTERS ────────────────────────────────────────────
const F = {
  n:   v => v >= 1e6 ? (v/1e6).toFixed(1)+'M' : v >= 1e3 ? (v/1e3).toFixed(1)+'K' : Math.round(v).toLocaleString(),
  pct: v => (v * 100).toFixed(1) + '%',
  pos: v => (+v).toFixed(1),
  dur: v => { const m = Math.floor(v/60), s = Math.round(v%60); return `${m}m ${s}s`; },
  date: d => typeof d === 'string' && d.length === 8 ? `${d.slice(4,6)}/${d.slice(6)}` : (d||'').slice(5)
};
function posClass(p) { return p <= 3 ? 'pos-1-3' : p <= 10 ? 'pos-4-10' : 'pos-11p'; }

// ── TOAST ─────────────────────────────────────────────────
const Toast = {
  show(type, title, msg, dur = 5000) {
    const icons = {
      success: '<polyline points="20 6 9 17 4 12"/>',
      warning: '<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>',
      danger:  '<circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>',
      info:    '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>'
    };
    const el = document.createElement('div');
    el.className = `toast toast-${type}`;
    el.innerHTML = `<div class="toast-icon"><svg viewBox="0 0 24 24">${icons[type]||icons.info}</svg></div><div class="toast-body"><div class="toast-title">${title}</div><div class="toast-msg">${msg}</div></div><button class="toast-close" onclick="this.closest('.toast').remove()">×</button>`;
    document.getElementById('toasts').appendChild(el);
    setTimeout(() => { el.style.animation = 'slideOut 0.22s ease both'; setTimeout(() => el.remove(), 220); }, dur);
  }
};

// ── LOG ───────────────────────────────────────────────────
const Log = {
  add(type, tag, msg) {
    const ts = new Date().toLocaleTimeString('en-US', { hour12: false });
    S.logLines.unshift({ type, tag, msg, ts });
    if (S.logLines.length > 80) S.logLines.pop();
    const el = document.getElementById('log-body');
    if (el) Log._render(el);
  },
  _render(el) {
    el.innerHTML = S.logLines.slice(0, 40).map(l =>
      `<div class="log-line log-${l.type}"><span class="log-ts">${l.ts}</span><span class="log-tag">${l.tag}</span><span class="log-msg">${l.msg}</span></div>`
    ).join('');
  },
  renderTo(el) { if (el) Log._render(el); }
};

// ── CLOCK ─────────────────────────────────────────────────
setInterval(() => {
  const el = document.getElementById('tb-clock');
  if (el) el.textContent = new Date().toLocaleTimeString('en-US', { hour12: false });
}, 1000);

// ── AUTH ──────────────────────────────────────────────────
const Auth = {
  client: null,
  connect() {
    const cid = CONFIG.CLIENT_ID || localStorage.getItem('si_client_id');
    if (!cid) { Toast.show('warning', 'No Client ID', 'Save your credentials in API Config first.'); App.go('config'); return; }
    CONFIG.CLIENT_ID = cid;
    try {
      Auth.client = google.accounts.oauth2.initTokenClient({
        client_id: CONFIG.CLIENT_ID,
        scope: CONFIG.SCOPES,
        callback: r => {
          if (r.error) { Toast.show('danger', 'Auth failed', r.error); Log.add('err', 'AUTH', r.error); return; }
          S.token = r.access_token;
          S.tokenExpiry = Date.now() + r.expires_in * 1000;
          Auth._onSignIn();
        }
      });
      Auth.client.requestAccessToken();
    } catch(e) {
      Toast.show('danger', 'GIS not ready', 'Google Identity Services is still loading. Wait a moment and try again.');
    }
  },
  _onSignIn() {
    Log.add('ok', 'AUTH', 'Token acquired — webmasters + analytics');
    document.getElementById('conn-dot').className = 'sb-conn-dot live';
    document.getElementById('conn-text').textContent = 'Connected';
    document.getElementById('conn-label').textContent = 'Google OAuth';
    const btn = document.getElementById('btn-auth');
    btn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Sign out`;
    btn.className = 'tb-btn tb-btn-danger';
    btn.disabled = false;
    document.getElementById('pill-status').className = 'status-pill pill-live';
    document.getElementById('pill-text').textContent = 'Live';
    Toast.show('success', 'Connected', 'Fetching GSC and GA4 data…');
    App.fetchAll();
  },
  signOut() {
    S.token = null;
    document.getElementById('conn-dot').className = 'sb-conn-dot';
    document.getElementById('conn-text').textContent = 'Not connected';
    document.getElementById('conn-label').textContent = 'Google OAuth';
    const btn = document.getElementById('btn-auth');
    btn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg> Connect Google`;
    btn.className = 'tb-btn tb-btn-primary';
    btn.disabled = false;
    document.getElementById('pill-status').className = 'status-pill pill-idle';
    document.getElementById('pill-text').textContent = 'Idle';
    Toast.show('info', 'Signed out', 'Session cleared.');
  },
  ok() { return !!(S.token && Date.now() < S.tokenExpiry); }
};

// ── API ───────────────────────────────────────────────────
const API = {
  _dr() {
    const e = new Date(), s = new Date();
    s.setDate(e.getDate() - S.dateRange);
    return { startDate: s.toISOString().slice(0,10), endDate: e.toISOString().slice(0,10) };
  },
  async gscPost(path, body) {
    const r = await fetch(`https://www.googleapis.com/webmasters/v3${path}`, {
      method:'POST', headers:{ Authorization:`Bearer ${S.token}`, 'Content-Type':'application/json' }, body:JSON.stringify(body)
    });
    if (!r.ok) { const t = await r.text(); throw new Error(`GSC ${r.status}: ${t.slice(0,120)}`); }
    return r.json();
  },
  async ga4Post(body) {
    const prop = CONFIG.GA4_PROPERTY || localStorage.getItem('si_ga4');
    if (!prop) throw new Error('GA4 property not configured');
    const r = await fetch(`https://analyticsdata.googleapis.com/v1beta/${prop}:runReport`, {
      method:'POST', headers:{ Authorization:`Bearer ${S.token}`, 'Content-Type':'application/json' }, body:JSON.stringify(body)
    });
    if (!r.ok) { const t = await r.text(); throw new Error(`GA4 ${r.status}: ${t.slice(0,120)}`); }
    return r.json();
  },
  site() { return CONFIG.GSC_SITE || localStorage.getItem('si_site') || ''; },
  async fetchGSCQueries() {
    const d = API._dr(); Log.add('info','GSC',`Queries ${d.startDate} → ${d.endDate}`);
    return API.gscPost(`/sites/${encodeURIComponent(API.site())}/searchAnalytics/query`, { ...d, dimensions:['query'], rowLimit:500 });
  },
  async fetchGSCPages() {
    return API.gscPost(`/sites/${encodeURIComponent(API.site())}/searchAnalytics/query`, { ...API._dr(), dimensions:['page'], rowLimit:200 });
  },
  async fetchGSCTimeSeries() {
    return API.gscPost(`/sites/${encodeURIComponent(API.site())}/searchAnalytics/query`, { ...API._dr(), dimensions:['date'], rowLimit:200 });
  },
  async fetchGSCDevices() {
    return API.gscPost(`/sites/${encodeURIComponent(API.site())}/searchAnalytics/query`, { ...API._dr(), dimensions:['device'], rowLimit:5 });
  },
  async fetchGSCDrilldown(query) {
    return API.gscPost(`/sites/${encodeURIComponent(API.site())}/searchAnalytics/query`, {
      ...API._dr(), dimensions:['page'],
      dimensionFilterGroups:[{ filters:[{ dimension:'query', operator:'equals', expression:query }] }], rowLimit:25
    });
  },
  async fetchGA4Overview() {
    Log.add('info','GA4','Overview metrics');
    return API.ga4Post({ dateRanges:[API._dr()], metrics:[
      {name:'sessions'},{name:'totalUsers'},{name:'newUsers'},
      {name:'engagementRate'},{name:'averageSessionDuration'},
      {name:'screenPageViews'},{name:'bounceRate'},{name:'conversions'}
    ]});
  },
  async fetchGA4Channels() {
    return API.ga4Post({ dateRanges:[API._dr()],
      dimensions:[{name:'sessionDefaultChannelGrouping'}],
      metrics:[{name:'sessions'},{name:'totalUsers'},{name:'engagementRate'},{name:'conversions'}],
      orderBys:[{metric:{metricName:'sessions'},desc:true}]
    });
  },
  async fetchGA4Pages() {
    return API.ga4Post({ dateRanges:[API._dr()],
      dimensions:[{name:'pagePath'}],
      metrics:[{name:'screenPageViews'},{name:'totalUsers'},{name:'averageSessionDuration'},{name:'bounceRate'}],
      orderBys:[{metric:{metricName:'screenPageViews'},desc:true}], limit:100
    });
  },
  async fetchGA4TimeSeries() {
    return API.ga4Post({ dateRanges:[API._dr()], dimensions:[{name:'date'}],
      metrics:[{name:'sessions'},{name:'totalUsers'}], orderBys:[{dimension:{dimensionName:'date'}}]
    });
  }
};

// ── CHARTS ────────────────────────────────────────────────
function killChart(id) { if (S.charts[id]) { S.charts[id].destroy(); delete S.charts[id]; } }
const C = (k, a=0.8) => ({ indigo:`rgba(99,102,241,${a})`, success:`rgba(16,185,129,${a})`, warning:`rgba(245,158,11,${a})`, danger:`rgba(239,68,68,${a})`, info:`rgba(56,189,248,${a})`, purple:`rgba(167,139,250,${a})` })[k] || `rgba(99,102,241,${a})`;
const SCALE_OPTS = { x:{ grid:{color:'rgba(255,255,255,0.04)'}, ticks:{maxTicksLimit:10} }, y:{ grid:{color:'rgba(255,255,255,0.04)'}, beginAtZero:true } };

function lineChart(id, labels, datasets, extraOpts={}) {
  const ctx = document.getElementById(id); if (!ctx) return; killChart(id);
  S.charts[id] = new Chart(ctx, { type:'line', data:{labels,datasets}, options:{ responsive:true, maintainAspectRatio:false,
    plugins:{ legend:{display:datasets.length>1} }, scales:SCALE_OPTS,
    interaction:{mode:'index',intersect:false}, elements:{point:{radius:0,hitRadius:10},line:{tension:0.38}}, ...extraOpts }});
}
function barChart(id, labels, datasets, stacked=false) {
  const ctx = document.getElementById(id); if (!ctx) return; killChart(id);
  S.charts[id] = new Chart(ctx, { type:'bar', data:{labels,datasets}, options:{ responsive:true, maintainAspectRatio:false,
    plugins:{legend:{display:datasets.length>1}},
    scales:{ x:{grid:{color:'transparent'},stacked}, y:{grid:{color:'rgba(255,255,255,0.04)'},beginAtZero:true,stacked} },
    elements:{bar:{borderRadius:4}} }});
}
function donutChart(id, labels, data, colors) {
  const ctx = document.getElementById(id); if (!ctx) return; killChart(id);
  S.charts[id] = new Chart(ctx, { type:'doughnut', data:{labels,datasets:[{data,backgroundColor:colors,borderWidth:1,borderColor:'rgba(255,255,255,0.06)'}]},
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'right'}}, cutout:'68%' }});
}
function radarChart(id, labels, datasets) {
  const ctx = document.getElementById(id); if (!ctx) return; killChart(id);
  S.charts[id] = new Chart(ctx, { type:'radar', data:{labels,datasets}, options:{ responsive:true, maintainAspectRatio:false,
    scales:{ r:{ grid:{color:'rgba(255,255,255,0.06)'}, ticks:{display:false}, pointLabels:{color:'#94a3b8',font:{size:11}} } },
    plugins:{legend:{display:true}} }});
}

// ── DATA HELPERS ──────────────────────────────────────────
function gscTotals() {
  const rows = S.gscRows?.rows || [];
  const clicks = rows.reduce((s,r)=>s+r.clicks,0), imp = rows.reduce((s,r)=>s+r.impressions,0);
  return { clicks, impressions:imp, ctr:imp?clicks/imp:0, position:rows.length?rows.reduce((s,r)=>s+r.position,0)/rows.length:0 };
}
function ga4vals() {
  const v = S.ga4Overview?.rows?.[0]?.metricValues; if (!v) return null;
  return { sessions:+v[0].value, totalUsers:+v[1].value, newUsers:+v[2].value,
    engRate:+v[3].value, avgDur:+v[4].value, pageviews:+v[5].value, bounceRate:+v[6].value, conversions:+v[7].value };
}
function classifyIntents(rows) {
  const cats = [
    {label:'Question',   test:q=>/^(what|who|when|where|which)\b/.test(q)},
    {label:'How-to',     test:q=>/^how\b/.test(q)},
    {label:'Best/List',  test:q=>/\b(best|top|list|review)\b/.test(q)},
    {label:'Comparison', test:q=>/\b(vs|versus| or )\b/.test(q)},
    {label:'Definition', test:q=>/^(what is|define|meaning of)\b/.test(q)},
    {label:'Other',      test:()=>true}
  ];
  const result = cats.map(c=>({...c,imp:0,clicks:0,count:0}));
  rows.forEach(r=>{ const q=r.keys[0].toLowerCase(); for(const c of result){if(c.test(q)){c.imp+=r.impressions;c.clicks+=r.clicks;c.count++;break;}} });
  return result.filter(c=>c.count>0);
}
function detectAIOQueries(rows) {
  return rows.filter(r=>{ const q=r.keys[0].toLowerCase(); return /^(what|how|why|who|when|is|does|can|best|top|list)\b/.test(q)||q.split(' ').length>=5||q.includes('?'); });
}
function detectOpportunities(rows) {
  return rows.filter(r=>r.position>=4&&r.position<=20&&r.impressions>=100&&r.ctr<0.05)
    .map(r=>({...r,score:Math.round(((r.impressions/100)*0.4)+((20-r.position)/20*0.4)+((0.05-r.ctr)*200*0.2))}))
    .sort((a,b)=>b.score-a.score);
}
function detectCannibalization(rows) {
  const seen=new Map(), conflicts=[];
  rows.forEach(r=>{
    const stem=r.keys[0].toLowerCase().replace(/\b(a|an|the|for|in|to|of|and|or)\b/g,'').trim().split(' ').slice(0,3).join(' ');
    if(seen.has(stem)){const p=seen.get(stem),delta=Math.abs(r.position-p.position); if(delta<15)conflicts.push({query:r.keys[0],stem,pos1:p.position,pos2:r.position,delta});}
    else seen.set(stem,r);
  });
  return conflicts.sort((a,b)=>a.delta-b.delta).slice(0,40);
}
function snippetScore(r) { return Math.min(100,Math.round((r.ctr*800)+(r.position<=3?35:r.position<=10?15:3)+(r.clicks/Math.max(1,r.impressions)*50))); }

  return `<div class="metric-card" style="animation-delay:${delay}s;--glow-c:rgba(${rgb},0.2);animation:fadeUp 0.5s ease both ${delay}s,metric-shimmer 1.6s ease ${delay+0.3}s 1">

    <div class="metric-icon-wrap" style="background:rgba(${rgb},0.12);color:${hex}"><svg viewBox="0 0 24 24">${iconPath}</svg></div>

    <div class="metric-meta">${meta}</div>

}

  Toast.show('success','Exported',`${rows.length} rows saved.`);
}

        // Unlock Connect Google button
        const authBtn=document.getElementById('btn-auth');
        authBtn.disabled=false;
        Toast.show('success','Saved','Credentials saved. Click Connect Google in the toolbar to authenticate.');
        Log.add('ok','CFG',`Saved: site=${site}, ga4=${ga4||'–'}`);
      });
      document.getElementById('btn-test-conn').addEventListener('click', async () => {
        if (!Auth.ok()) { Toast.show('warning','Not connected','Click Connect Google first.'); return; }
        try { await App.fetchAll(); Toast.show('success','Connection OK','Data loaded successfully.'); }
        catch(e) { Toast.show('danger','Test failed',e.message); }
      });
    } else {
      el.innerHTML = `<div class="card"><div class="card-head"><div class="card-title">Setup Guide</div></div>
        <div class="card-body"><div style="display:flex;flex-direction:column;gap:18px;max-width:560px">
          ${[['1','Enable APIs','Go to console.cloud.google.com, select or create a project, then enable the Google Search Console API and the Google Analytics Data API.'],
             ['2','Create OAuth credentials','APIs & Services → Credentials → Create Credentials → OAuth 2.0 Client ID. Set Application type to Web Application. Add your current origin under Authorized JavaScript Origins.'],
             ['3','Fill in credentials above','Paste your Client ID, GSC property URL (exact match including trailing slash), and GA4 property ID into the Credentials tab. Click Save credentials.'],
             ['4','Connect Google','Click Connect Google in the top bar. A browser popup will open for the OAuth consent flow.'],
             ['5','Data loads automatically','On successful auth, all GSC and GA4 fetches run in parallel. Use the date range selector to change the window.']
            ].map(([n,title,desc])=>`<div style="display:flex;gap:14px">
              <div style="width:28px;height:28px;border-radius:50%;background:var(--indigo-dim);border:1px solid rgba(99,102,241,0.3);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--indigo-light);flex-shrink:0;margin-top:2px">${n}</div>
              <div><div style="font-size:13px;font-weight:600;margin-bottom:4px">${title}</div><div style="font-size:12px;color:var(--text-2);line-height:1.7">${desc}</div></div>
            </div>`).join('')}
        </div></div></div>`;
    }
  },

  // ── DRILLDOWN ────────────────────────────────────────────
  async drilldown(query) {
    if (!Auth.ok()) return;
    S.drilldownQuery=query;
    document.getElementById('drilldown-bar').classList.add('visible');
    document.getElementById('drilldown-label').textContent=query;
    const el=document.getElementById('content');
    el.innerHTML=`<div class="card"><div class="card-head"><div class="card-title">Pages ranking for "${query}"</div></div>${loadingHTML('Fetching page breakdown…')}</div>`;
    try {
      const data=await API.fetchGSCDrilldown(query);
      const rows=data.rows||[];
      el.innerHTML=`<div class="card"><div class="card-head">
        <div class="card-title">Pages ranking for <span style="color:var(--indigo-light)">"${query}"</span></div>
        <div class="card-actions"><span class="badge badge-indigo">${rows.length} pages</span><button class="btn btn-sm" id="dd-back">← Back</button></div>
      </div>
      <div class="table-wrap tall"><table>
        <thead><tr><th>Page</th><th>Clicks</th><th>Impressions</th><th>CTR</th><th>Avg Position</th></tr></thead>
        <tbody>${rows.length?rows.map(r=>`<tr><td class="td-url" title="${r.keys[0]}">${r.keys[0]}</td><td>${F.n(r.clicks)}</td><td>${F.n(r.impressions)}</td><td>${F.pct(r.ctr)}</td><td class="${posClass(r.position)} td-mono">${F.pos(r.position)}</td></tr>`).join(''):
          `<tr><td colspan="5">${noData('No page data for this query.')}</td></tr>`}
        </tbody></table></div></div>`;
      document.getElementById('dd-back')?.addEventListener('click', () => App.clearDrilldown());
      Log.add('ok','GSC',`Drilldown: "${query}" → ${rows.length} pages`);
    } catch(e) {
      el.innerHTML=`<div class="card">${noData(`Error: ${e.message}`)}</div>`;
      Log.add('err','GSC',e.message);
    }
  },

  clearDrilldown() {
    S.drilldownQuery=null;
    document.getElementById('drilldown-bar').classList.remove('visible');
    App._render();
  },

  // ── FETCH ALL ─────────────────────────────────────────────
  async fetchAll() {
    if (!Auth.ok()) return;
    document.getElementById('pill-text').textContent='Syncing…';
    Log.add('info','SYNC',`Fetching ${S.dateRange}d window`);
    const settled=await Promise.allSettled([API.fetchGSCQueries(),API.fetchGSCPages(),API.fetchGSCTimeSeries(),API.fetchGSCDevices()]);
    if (settled[0].status==='fulfilled') { S.gscRows=settled[0].value; Log.add('ok','GSC',`${S.gscRows.rows?.length||0} queries`); }
    else Log.add('err','GSC',settled[0].reason?.message);
    if (settled[1].status==='fulfilled') S.gscPages=settled[1].value;
    if (settled[2].status==='fulfilled') S.gscTimeSeries=settled[2].value;
    if (settled[3].status==='fulfilled') S.gscDevices=settled[3].value;
    const hasProp=CONFIG.GA4_PROPERTY||localStorage.getItem('si_ga4');
    if (hasProp) {
      const g=await Promise.allSettled([API.fetchGA4Overview(),API.fetchGA4Channels(),API.fetchGA4Pages(),API.fetchGA4TimeSeries()]);
      if (g[0].status==='fulfilled') { S.ga4Overview=g[0].value; Log.add('ok','GA4','Overview loaded'); }
      else Log.add('warn','GA4',g[0].reason?.message||'Failed');
      if (g[1].status==='fulfilled') S.ga4Channels=g[1].value;
      if (g[2].status==='fulfilled') S.ga4Pages=g[2].value;
      if (g[3].status==='fulfilled') S.ga4TimeSeries=g[3].value;
    } else {
      Log.add('warn','GA4','No property configured — skipping');
    }
    S.lastSync=new Date();
    document.getElementById('sb-sync').textContent=`Synced ${S.lastSync.toLocaleTimeString()}`;
    document.getElementById('sb-queries').textContent=`${S.gscRows?.rows?.length||0} queries`;
    document.getElementById('pill-text').textContent='Live';
    const opp=detectOpportunities(S.gscRows?.rows||[]);
    const badge=document.getElementById('nav-opp-count');
    badge.textContent=opp.length; badge.style.display=opp.length?'':'none';
    Toast.show('success','Synced',`${S.gscRows?.rows?.length||0} queries · ${S.gscPages?.rows?.length||0} pages`);
    App._render();
  }
};

// ── CONTROLS ──────────────────────────────────────────────
document.getElementById('btn-collapse').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('collapsed'));
document.getElementById('btn-auth').addEventListener('click', () => Auth.ok() ? Auth.signOut() : Auth.connect());
document.getElementById('btn-refresh').addEventListener('click', () => { if(Auth.ok()) App.fetchAll(); else Toast.show('warning','Not connected','Authenticate first.'); });
document.getElementById('date-range').addEventListener('change', e => { S.dateRange=+e.target.value; if(Auth.ok()) App.fetchAll(); });
document.getElementById('drilldown-back').addEventListener('click', () => App.clearDrilldown());

// ── INIT ──────────────────────────────────────────────────
function init() {
  // Load saved credentials
  const cid=localStorage.getItem('si_client_id');
  const site=localStorage.getItem('si_site');
  const ga4=localStorage.getItem('si_ga4');
  if (cid) CONFIG.CLIENT_ID=cid;
  if (site) { CONFIG.GSC_SITE=site; document.getElementById('sb-domain').textContent=site; }
  if (ga4) CONFIG.GA4_PROPERTY=ga4;

  const hasCredentials=!!(cid&&site);

  // Wire nav items AFTER App is defined
  document.querySelectorAll('.nav-item[data-view]').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      App.go(this.dataset.view);
    });
  });

  if (hasCredentials) {
    // Credentials exist — unlock Connect button and go to dashboard
    document.getElementById('btn-auth').disabled=false;
    document.getElementById('conn-label').textContent='Ready to connect';
    document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
    document.querySelector('.nav-item[data-view="dashboard"]').classList.add('active');
    App.go('dashboard');
    Log.add('info','SYS','Credentials loaded — click Connect Google to sync');
  } else {
    // No credentials — go to config, keep Connect button disabled
    document.getElementById('btn-auth').disabled=true;
    document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
    document.querySelector('.nav-item[data-view="config"]').classList.add('active');
    App.go('config');
    Toast.show('info','Welcome','Enter your Client ID and GSC site URL, then click Save credentials.');
    Log.add('warn','SYS','No credentials found — configure in API Config');
  }

  Log.add('info','SYS','Search Intel OS v3.2 initialized');
  Log.add('info','SYS','APIs: GSC v3 · GA4 Data API v1beta');
}

init();
</script>
</body>
</html>
